<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <title>詠唱机 EISHOUGI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Mock Tauri IPC to prevent React crashes when running in a pure browser (e.g. Mobile Chrome)
      if (!window.__TAURI_INTERNALS__) {
        console.warn("Tauri environment not detected. Mocking __TAURI_INTERNALS__ to prevent crashes.");
        window.__TAURI_INTERNALS__ = {
          invoke: async (cmd, args) => {
            console.log(`[Mock Tauri] invoke: ${cmd}`);
            if (['list_prompts', 'get_prompts', 'get_workflows', 'list_generated_images', 'get_favorites', 'get_mcp_tools'].includes(cmd)) return [];
            if (cmd === 'get_artists') return { items: [], total: 0 };
            return null;
          }
        };
      }
      if (!window.__TAURI_IPC__) {
        window.__TAURI_IPC__ = async () => {};
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
